version: '3'

tasks:
  # --- Tests ---
  run-test:
    desc: Run all tests
    cmd: npm run test

  test-headed:
    desc: Run tests with browser open
    cmd: npm run test_headed

  test-ui:
    desc: Open Playwright UI for interactive debugging
    cmd: npm run test_ui

  test-report:
    desc: Show HTML report from last run
    cmd: npm run test_report

  report:
    desc: Run all tests and open HTML report
    cmds:
      - task: run-test
      - task: test-report

  # --- Code quality ---
  lint:
    desc: Check code with ESLint
    cmd: npm run lint

  lint-fix:
    desc: Auto-fix lint issues with ESLint
    cmd: npm run lint-fix

  format-check:
    desc: Check code formatting with Prettier
    cmd: npm run format-check

  format-fix:
    desc: Auto-fix formatting with Prettier
    cmd: npm run format

  check:
    desc: Run all code quality checks (ESLint + Prettier)
    cmds:
      - task: lint
      - task: format-check

  fix:
    desc: Auto-fix formatting and lint issues (Prettier + ESLint)
    cmds:
      - npm run format
      - npm run lint-fix
